<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgendaPro — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
      <!-- Tags para o WhatsApp e Redes Sociais -->
    <meta property="og:title" content="Acesso ao Sistema - AgendaPro" />
    <meta property="og:description" content="Faça login para acessar o sistema de agendamento e gestão de pacientes." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1200&auto=format&fit=crop" />
    <meta property="og:type" content="website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

</head>
<body class="login-page">

  <!-- FUNDO COM PARTÍCULAS DE SAÚDE -->
  <div class="login-bg">
    <div class="bg-overlay"></div>
    <div class="floating-icons">
      <i class="fa-solid fa-heart-pulse icon-float" style="top:10%;left:8%;font-size:28px;animation-delay:0s"></i>
      <i class="fa-solid fa-stethoscope icon-float" style="top:20%;left:85%;font-size:36px;animation-delay:1s"></i>
      <i class="fa-solid fa-pills icon-float" style="top:60%;left:5%;font-size:24px;animation-delay:2s"></i>
      <i class="fa-solid fa-hospital icon-float" style="top:75%;left:88%;font-size:32px;animation-delay:0.5s"></i>
      <i class="fa-solid fa-syringe icon-float" style="top:40%;left:92%;font-size:22px;animation-delay:1.5s"></i>
      <i class="fa-solid fa-dna icon-float" style="top:85%;left:15%;font-size:30px;animation-delay:3s"></i>
      <i class="fa-solid fa-microscope icon-float" style="top:5%;left:50%;font-size:26px;animation-delay:2.5s"></i>
      <i class="fa-solid fa-notes-medical icon-float" style="top:50%;left:2%;font-size:20px;animation-delay:0.8s"></i>
    </div>
  </div>

  <!-- CARD DE LOGIN -->
  <div class="login-wrapper">

    <!-- LADO ESQUERDO - INFO -->
    <div class="login-info">
      <div class="login-info-content">
        <div class="brand-icon">
          <i class="fa-solid fa-calendar-check"></i>
        </div>
        <h1>AgendaPro</h1>
        <p class="brand-sub">Plataforma de Agendamento em Saúde</p>
        <div class="info-features">
          <div class="feature-item">
            <i class="fa-solid fa-check-circle"></i>
            <span>Gerencie consultas com facilidade</span>
          </div>
          <div class="feature-item">
            <i class="fa-solid fa-check-circle"></i>
            <span>Histórico completo dos pacientes</span>
          </div>
          <div class="feature-item">
            <i class="fa-solid fa-check-circle"></i>
            <span>Agenda inteligente e organizada</span>
          </div>
          <div class="feature-item">
            <i class="fa-solid fa-check-circle"></i>
            <span>Acesso rápido e seguro</span>
          </div>
        </div>
      </div>
    </div>

    <!-- LADO DIREITO - FORMULÁRIO -->
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-circle">
          <i class="fa-solid fa-calendar-check"></i>
        </div>
        <h2>Bem-vindo de volta!</h2>
        <p>Faça login para acessar o sistema</p>
      </div>

      <form class="login-form" onsubmit="fazerLogin(event)">
        <div class="input-group">
          <label>Usuário</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="usuario" placeholder="Digite seu usuário" required/>
          </div>
        </div>
        <div class="input-group">
          <label>Senha</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="senha" placeholder="Digite sua senha" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar no Sistema
        </button>
        <div class="login-hint">
          <i class="fa-solid fa-circle-info"></i>
          Usuário: <b>admin</b> &nbsp;|&nbsp; Senha: <b>1234</b>
        </div>
      </form>

      <div class="login-footer">
        <i class="fa-solid fa-shield-halved"></i> Acesso seguro e criptografado
      </div>
    </div>

  </div>

  <script>
    function fazerLogin(e) {
      e.preventDefault();
      const u = document.getElementById('usuario').value;
      const s = document.getElementById('senha').value;
      const btn = document.querySelector('.btn-login');

      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';
      btn.disabled = true;

      setTimeout(() => {
        if (u === 'admin' && s === '1234') {
          window.location.href = 'pages/dashboard.html';
        } else {
          btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar no Sistema';
          btn.disabled = false;
          const hint = document.querySelector('.login-hint');
          hint.style.color = '#e74c3c';
          hint.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Usuário ou senha incorretos!';
          setTimeout(() => {
            hint.style.color = '';
            hint.innerHTML = '<i class="fa-solid fa-circle-info"></i> Usuário: <b>admin</b> &nbsp;|&nbsp; Senha: <b>1234</b>';
          }, 3000);
        }
      }, 800);
    }
  </script>
</body>
</html>
